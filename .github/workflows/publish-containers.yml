name: Publish containers

on:
  pull_request:
    paths:
      - Dockerfile.codex-web
      - Dockerfile.codex-app-server
      - package.json
      - package-lock.json
      - assets/**
      - patches/**
      - scripts/**
      - src/**
      - .github/workflows/publish-containers.yml
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - Dockerfile.codex-web
      - Dockerfile.codex-app-server
      - package.json
      - package-lock.json
      - assets/**
      - patches/**
      - scripts/**
      - src/**
      - .github/workflows/publish-containers.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    name: Build and publish images
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Lowercase owner
        id: owner
        shell: bash
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata for codex-web
        id: meta_codex_web
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.owner_lc }}/codex-web
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short
            type=ref,event=tag

      - name: Build and publish codex-web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.codex-web
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta_codex_web.outputs.tags }}
          labels: ${{ steps.meta_codex_web.outputs.labels }}
          cache-from: type=gha,scope=codex-web
          cache-to: type=gha,mode=max,scope=codex-web

      - name: Metadata for codex-app-server
        id: meta_codex_app_server
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.owner_lc }}/codex-app-server
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short
            type=ref,event=tag

      - name: Build and publish codex-app-server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.codex-app-server
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta_codex_app_server.outputs.tags }}
          labels: ${{ steps.meta_codex_app_server.outputs.labels }}
          cache-from: type=gha,scope=codex-app-server
          cache-to: type=gha,mode=max,scope=codex-app-server
